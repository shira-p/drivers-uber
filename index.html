<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דרייברים&אובר - הנסיעה שלך, השירות שלנו</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a227;
      --gold-light: #f0c040;
      --gold-dark: #a07c10;
      --bg: #0a0908;
      --card-bg: rgba(20,18,14,0.90);
      --text: #f5f0e8;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══ HERO ══ */
    .hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(60px,10vw,100px) clamp(16px,6vw,60px) clamp(40px,8vw,80px);
      overflow: hidden;
      background: var(--bg);
    }



    /* glowing gold radial behind car */
    .hero-glow {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: min(900px, 120vw);
      height: 50%;
      background: radial-gradient(ellipse 70% 70% at 50% 100%, rgba(201,162,39,0.09) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* gold grid overlay */
    .hero-grid {
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(201,162,39,0.022) 39px, rgba(201,162,39,0.022) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,162,39,0.022) 39px, rgba(201,162,39,0.022) 40px);
      z-index: 1; pointer-events: none;
    }

    .hero > *:not(.hero-car-wrap):not(.hero-grid):not(.hero-glow) { position: relative; z-index: 2; }

    /* headlight pulse */
    @keyframes hlPulse { 0%,100%{opacity:.5} 50%{opacity:1} }
    .hl { animation: hlPulse 3s ease-in-out infinite; }
    @keyframes rlPulse { 0%,100%{opacity:.4} 50%{opacity:.75} }
    .rl { animation: rlPulse 3s 1s ease-in-out infinite; }

    .hero-title {
      font-size: clamp(2.4rem, 9vw, 5.8rem);
      font-weight: 900; color: var(--gold-light);
      letter-spacing: -1px; line-height: 1.05;
      text-shadow: 0 0 60px rgba(201,162,39,0.5), 0 2px 8px rgba(0,0,0,0.95);
      animation: fadeDown .7s ease both;
    }
    .hero-sub {
      margin-top: 12px;
      font-size: clamp(1rem, 3.5vw, 1.45rem);
      font-weight: 400; color: rgba(245,240,232,0.88);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      animation: fadeDown .7s .15s ease both;
    }
    .hero-buttons {
      margin-top: clamp(32px,6vw,52px);
      display: flex; flex-direction: column; gap: 14px;
      width: 100%; max-width: 420px;
      animation: fadeUp .7s .3s ease both;
    }
    .btn-whatsapp {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: clamp(14px,3vw,18px) 28px; border-radius: 50px;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-dark) 100%);
      color: #1a1200;
      font-size: clamp(1rem,3vw,1.15rem); font-weight: 700; font-family: 'Heebo',sans-serif;
      text-decoration: none; border: none; cursor: pointer;
      box-shadow: 0 4px 30px rgba(201,162,39,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform .15s, box-shadow .15s; white-space: nowrap;
    }
    .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 8px 42px rgba(201,162,39,0.62); }
    .btn-whatsapp:active { transform: scale(.97); }
    .btn-call {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: clamp(12px,2.5vw,15px) 28px; border-radius: 50px;
      background: transparent; color: var(--gold-light);
      font-size: clamp(.95rem,2.8vw,1.05rem); font-weight: 600; font-family: 'Heebo',sans-serif;
      text-decoration: none; border: 2px solid var(--gold); cursor: pointer;
      transition: background .15s; white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .btn-call:hover { background: rgba(201,162,39,0.12); }

    /* ══ FEATURES ══ */
    .features {
      padding: clamp(16px,4vw,32px) clamp(12px,4vw,24px) clamp(60px,10vw,100px);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 190px), 1fr));
      gap: clamp(12px,2.5vw,18px);
      max-width: 980px; margin: 0 auto; width: 100%;
    }
    @media (max-width: 480px) { .features { grid-template-columns: 1fr; } }

    .feature-card {
      background: var(--card-bg);
      border: 1px solid rgba(201,162,39,0.18);
      border-radius: 18px;
      padding: clamp(22px,4vw,34px) clamp(14px,3vw,24px);
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      backdrop-filter: blur(8px);
      transition: border-color .2s, transform .2s, box-shadow .2s;
      animation: fadeUp .6s ease both;
    }
    .feature-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(201,162,39,0.18); }
    .feature-card:nth-child(1){animation-delay:.1s}
    .feature-card:nth-child(2){animation-delay:.2s}
    .feature-card:nth-child(3){animation-delay:.3s}
    .feature-card:nth-child(4){animation-delay:.4s}
    .feature-card:nth-child(5){animation-delay:.5s}

    .feature-icon { width: clamp(40px,5vw,54px); height: clamp(40px,5vw,54px); color: var(--gold); }
    .feature-label { font-size: clamp(.95rem,2.5vw,1.15rem); font-weight: 700; }

    .feature-card.female {
      border-color: rgba(240,192,64,0.5);
      background: linear-gradient(145deg, rgba(22,18,6,0.96), rgba(32,26,8,0.96));
      position: relative; overflow: visible;
    }
    .feature-card.female::before {
      content: '✦ חדש';
      position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
      background: var(--gold-light); color: #1a1200;
      font-size: 0.65rem; font-weight: 900;
      padding: 3px 10px; border-radius: 20px;
      white-space: nowrap; letter-spacing: .5px;
      box-shadow: 0 2px 10px rgba(201,162,39,0.55);
    }
    .female .feature-icon { color: var(--gold-light); }
    .female .feature-label { color: var(--gold-light); }

    /* ══ FAB ══ */
    .fab-area { position: fixed; bottom: 20px; left: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 200; }
    .fab {
      width: clamp(46px,7vw,54px); height: clamp(46px,7vw,54px);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      text-decoration: none; box-shadow: 0 4px 16px rgba(0,0,0,.5); transition: transform .15s;
    }
    .fab:hover { transform: scale(1.1); }
    .fab-access { background: #2b8ce0; }
    .fab-wa { background: linear-gradient(135deg, var(--gold-light), var(--gold-dark)); }

    footer { text-align: center; padding: 20px 16px; font-size: clamp(.72rem,2vw,.82rem); color: rgba(245,240,232,0.28); }

    @media (min-width: 768px) {
      .hero-buttons { flex-direction: row; justify-content: center; max-width: 600px; }
      .btn-whatsapp, .btn-call { flex: 1; }
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(24px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>
